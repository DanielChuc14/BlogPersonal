<div class="admin-page">
  <div class="page-header">
    <h2>{{ isEdit ? 'Edit Tag' : 'New Tag' }}</h2>
    <button mat-stroked-button type="button" (click)="cancel()">
      <mat-icon>arrow_back</mat-icon> Back
    </button>
  </div>

  @if (loading) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }

  @if (!loading) {
    <mat-card class="form-card">
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" placeholder="Tag name" />
            <mat-icon matSuffix>label</mat-icon>
            <mat-error>
              @if (form.get('name')?.hasError('required')) { Name is required }
              @else if (form.get('name')?.hasError('minlength')) { Minimum 2 characters }
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" rows="4" placeholder="Optional description..."></textarea>
          </mat-form-field>

          <div class="form-actions">
            <button mat-button type="button" (click)="cancel()">Cancel</button>
            <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || saving">
              @if (saving) { <mat-spinner diameter="20"></mat-spinner> }
              @else { {{ isEdit ? 'Save Changes' : 'Create Tag' }} }
            </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  }
</div>
