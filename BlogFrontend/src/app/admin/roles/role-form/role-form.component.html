<div class="max-w-[1200px] mx-auto animate-fade-in">
  <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
    <h2 class="text-[1.35rem] sm:text-[1.75rem] font-bold text-[var(--text-primary)] m-0">
      {{ isEdit ? 'Edit Role' : 'New Role' }}
    </h2>
    <app-btn variant="secondary" type="button" (btnClick)="cancel()">
      <mat-icon>arrow_back</mat-icon> Back
    </app-btn>
  </div>

  @if (!loading) {
    <app-crud-form [loading]="saving" class="max-w-[720px] block">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Role Name</mat-label>
          <input matInput formControlName="name" placeholder="e.g. Admin, Editor..." />
          <mat-icon matSuffix>shield</mat-icon>
          <mat-error>
            @if (form.get('name')?.hasError('required')) { Name is required }
            @else if (form.get('name')?.hasError('minlength')) { Minimum 2 characters }
          </mat-error>
        </mat-form-field>

        <div class="flex gap-3 justify-end mt-6 pt-4 border-t border-gray-100 dark:border-slate-700 flex-wrap">
          <app-btn variant="ghost" type="button" (btnClick)="cancel()">Cancel</app-btn>
          <app-btn variant="primary" type="submit" [disabled]="form.invalid || saving" [loading]="saving">
            {{ isEdit ? 'Save Changes' : 'Create Role' }}
          </app-btn>
        </div>
      </form>
    </app-crud-form>
  }
</div>
