<div class="max-w-[1200px] mx-auto animate-fade-in">
  <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
    <h2 class="text-[1.35rem] sm:text-[1.75rem] font-bold text-[var(--text-primary)] m-0">Roles</h2>
    <app-btn variant="primary" (btnClick)="newRole()">
      <mat-icon>add</mat-icon> New Role
    </app-btn>
  </div>

  <app-data-table
    [columns]="['Role Name', 'Permissions', 'Actions']"
    [loading]="loading"
    [isEmpty]="!loading && roles.length === 0"
    emptyIcon="shield"
    emptyMessage="No roles yet.">

    @for (r of roles; track r.id) {
      <tr class="tbl-row">
        <td class="tbl-cell">
          <span class="inline-flex items-center gap-1.5 font-medium">
            <mat-icon class="!text-[1rem] !h-4 !w-4 text-[var(--text-secondary)]">shield</mat-icon>
            {{ r.name }}
          </span>
        </td>
        <td class="tbl-cell">
          <a [routerLink]="['/admin/roles', r.id, 'permissions']"
             class="inline-flex items-center gap-1 text-xs font-medium text-blue-600 dark:text-blue-400
                    hover:text-blue-800 dark:hover:text-blue-200 hover:underline transition-colors duration-150">
            <mat-icon class="!text-[0.85rem] !h-[0.85rem] !w-[0.85rem]">vpn_key</mat-icon>
            Manage
          </a>
        </td>
        <td class="tbl-cell-actions">
          <app-btn variant="icon" (btnClick)="editRole(r.id)" matTooltip="Edit role">
            <mat-icon class="!text-blue-500 dark:!text-blue-400">edit</mat-icon>
          </app-btn>
          <app-btn variant="icon" (btnClick)="deleteRole(r)" matTooltip="Delete role">
            <mat-icon class="!text-red-500 dark:!text-red-400">delete</mat-icon>
          </app-btn>
        </td>
      </tr>
    }
  </app-data-table>
</div>
