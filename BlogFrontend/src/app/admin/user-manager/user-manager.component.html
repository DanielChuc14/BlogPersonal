<div class="max-w-[1200px] mx-auto animate-fade-in">
  <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
    <h2 class="text-[1.35rem] sm:text-[1.75rem] font-bold text-[var(--text-primary)] m-0">Users</h2>
  </div>

  <app-data-table
    [columns]="['Email', 'Username', 'Roles', 'Status', 'Actions']"
    [loading]="loading"
    [isEmpty]="!loading && users.length === 0"
    emptyIcon="people"
    emptyMessage="No users found.">

    @for (u of users; track u.id) {
      <tr class="tbl-row">
        <td class="tbl-cell font-medium">{{ u.email }}</td>
        <td class="tbl-cell">{{ u.userName }}</td>
        <td class="tbl-cell">
          <div class="flex flex-wrap gap-1">
            @for (role of u.roles; track role) {
              <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium
                           bg-brand-accent/10 text-brand-accent dark:bg-brand-accent/20">
                {{ role }}
              </span>
            }
          </div>
        </td>
        <td class="tbl-cell">
          @if (isLocked(u)) {
            <span class="inline-flex items-center gap-1 text-red-600 dark:text-red-400 text-sm font-medium">
              <mat-icon class="!text-[1rem] !h-4 !w-4">lock</mat-icon> Locked
            </span>
          } @else {
            <span class="inline-flex items-center gap-1 text-green-600 dark:text-green-400 text-sm font-medium">
              <mat-icon class="!text-[1rem] !h-4 !w-4">lock_open</mat-icon> Active
            </span>
          }
        </td>
        <td class="tbl-cell-actions">
          @if (isLocked(u)) {
            <app-btn variant="icon" [disabled]="actionLoading[u.id]" (btnClick)="unlock(u)" title="Unlock">
              <mat-icon class="!text-blue-500 dark:!text-blue-400">lock_open</mat-icon>
            </app-btn>
          } @else {
            <app-btn variant="icon" [disabled]="actionLoading[u.id]" (btnClick)="lock(u)" title="Lock">
              <mat-icon class="!text-amber-500 dark:!text-amber-400">lock</mat-icon>
            </app-btn>
          }
          <app-btn variant="icon" [disabled]="actionLoading[u.id]" (btnClick)="resetPassword(u)" title="Reset Password">
            <mat-icon class="!text-[var(--text-secondary)]">key</mat-icon>
          </app-btn>
        </td>
      </tr>
    }
  </app-data-table>

  <!-- Keep mat-paginator (server-side pagination) -->
  <div class="mt-2 bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700">
    <mat-paginator
      [length]="total"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPage($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
