<div class="max-w-[1200px] mx-auto animate-fade-in">
  <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
    <h2 class="text-[1.35rem] sm:text-[1.75rem] font-bold text-brand-dark m-0">Categories</h2>
    <button mat-raised-button color="primary" (click)="newCategory()">
      <mat-icon>add</mat-icon> New Category
    </button>
  </div>

  @if (loading) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }

  <mat-card>
    <div class="overflow-x-auto rounded-lg">
      <table mat-table [dataSource]="categories" class="full-width">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let c" class="cell-title">
            <span class="category-chip">
              <mat-icon>category</mat-icon> {{ c.name }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let c" class="cell-desc">{{ c.description || '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="col-actions">Actions</th>
          <td mat-cell *matCellDef="let c" class="col-actions">
            <button mat-icon-button color="primary" (click)="editCategory(c.id)" matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteCategory(c.id)" matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
      </table>
    </div>

    @if (!loading && categories.length === 0) {
      <div class="text-center py-12 px-8 text-[#5f6368] italic">
        <mat-icon class="![font-size:3rem] ![height:3rem] ![width:3rem] block mx-auto mb-4 opacity-40">category</mat-icon>
        <p class="m-0">No categories yet.</p>
      </div>
    }
  </mat-card>
</div>
