<div class="max-w-[1200px] mx-auto animate-fade-in">
  <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
    <h2 class="text-[1.35rem] sm:text-[1.75rem] font-bold text-[var(--text-primary)] m-0">Categories</h2>
    <app-btn variant="primary" (btnClick)="newCategory()">
      <mat-icon>add</mat-icon> New Category
    </app-btn>
  </div>

  @if (alertMessage) {
    <app-alert [type]="alertType" [message]="alertMessage" [dismissible]="true" (dismissed)="alertMessage = ''" class="mb-4 block" />
  }

  <app-data-table
    [columns]="['Name', 'Description', 'Actions']"
    [loading]="loading"
    [isEmpty]="!loading && categories.length === 0"
    emptyIcon="category"
    emptyMessage="No categories yet.">

    @for (c of categories; track c.id) {
      <tr class="tbl-row">
        <td class="tbl-cell">
          <span class="inline-flex items-center gap-1.5 font-medium">
            <mat-icon class="!text-[1rem] !h-4 !w-4 text-[var(--text-secondary)]">category</mat-icon>
            {{ c.name }}
          </span>
        </td>
        <td class="tbl-cell-muted">{{ c.description || '—' }}</td>
        <td class="tbl-cell-actions">
          <app-btn variant="icon" (btnClick)="editCategory(c.id)" title="Edit">
            <mat-icon class="!text-blue-500 dark:!text-blue-400">edit</mat-icon>
          </app-btn>
          <app-btn variant="icon" (btnClick)="deleteCategory(c)" title="Delete">
            <mat-icon class="!text-red-500 dark:!text-red-400">delete</mat-icon>
          </app-btn>
        </td>
      </tr>
    }
  </app-data-table>
</div>
