<div class="max-w-[1200px] mx-auto animate-fade-in">
  <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
    <h2 class="text-[1.35rem] sm:text-[1.75rem] font-bold text-[var(--text-primary)] m-0">Posts</h2>
    <app-btn variant="primary" (btnClick)="newPost()">
      <mat-icon>add</mat-icon> New Post
    </app-btn>
  </div>

  @if (alertMessage) {
    <app-alert [type]="alertType" [message]="alertMessage" [dismissible]="true" (dismissed)="alertMessage = ''" class="mb-4 block" />
  }

  <app-data-table
    [columns]="['Title', 'Status', 'Categories', 'Tags', 'Actions']"
    [loading]="loading"
    [isEmpty]="!loading && posts.length === 0"
    emptyIcon="article"
    emptyMessage="No posts yet. Create your first post!">

    @for (p of posts; track p.id) {
      <tr class="tbl-row">
        <td class="tbl-cell font-medium max-w-[280px] truncate">{{ p.title }}</td>
        <td class="tbl-cell">
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold"
            [ngClass]="p.status === 1
              ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400'
              : 'bg-gray-100  text-gray-500  dark:bg-slate-700   dark:text-slate-400'">
            {{ p.status === 1 ? 'Published' : 'Draft' }}
          </span>
        </td>
        <td class="tbl-cell-muted">{{ getCategoryNames(p.id) || '—' }}</td>
        <td class="tbl-cell-muted">{{ getTagNames(p.id) || '—' }}</td>
        <td class="tbl-cell-actions">
          <app-btn variant="icon" (btnClick)="editPost(p.id)" title="Edit">
            <mat-icon class="!text-blue-500 dark:!text-blue-400">edit</mat-icon>
          </app-btn>
          <app-btn variant="icon" (btnClick)="deletePost(p)" title="Delete">
            <mat-icon class="!text-red-500 dark:!text-red-400">delete</mat-icon>
          </app-btn>
        </td>
      </tr>
    }
  </app-data-table>
</div>
