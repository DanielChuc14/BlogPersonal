<div class="admin-page">
  <div class="page-header">
    <h2>Posts</h2>
    <button mat-raised-button color="primary" (click)="newPost()">
      <mat-icon>add</mat-icon> New Post
    </button>
  </div>

  @if (loading) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }

  <mat-card>
    <div class="table-container">
      <table mat-table [dataSource]="posts" class="full-width">

        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>Title</th>
          <td mat-cell *matCellDef="let p" class="cell-title">{{ p.title }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let p">
            <span class="status-badge" [class.status-badge--published]="p.status === 1" [class.status-badge--draft]="p.status === 0">
              {{ p.status === 1 ? 'Published' : 'Draft' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="categories">
          <th mat-header-cell *matHeaderCellDef>Categories</th>
          <td mat-cell *matCellDef="let p" class="cell-tags">{{ getCategoryNames(p.id) || '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="tags">
          <th mat-header-cell *matHeaderCellDef>Tags</th>
          <td mat-cell *matCellDef="let p" class="cell-tags">{{ getTagNames(p.id) || '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="col-actions">Actions</th>
          <td mat-cell *matCellDef="let p" class="col-actions">
            <button mat-icon-button color="primary" (click)="editPost(p.id)" matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deletePost(p.id)" matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
      </table>
    </div>

    @if (!loading && posts.length === 0) {
      <div class="no-data">
        <mat-icon>article</mat-icon>
        <p>No posts yet. Create your first post!</p>
      </div>
    }
  </mat-card>
</div>
