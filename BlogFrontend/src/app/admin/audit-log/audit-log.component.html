<div class="max-w-[1400px] mx-auto animate-fade-in">
  <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
    <h2 class="text-[1.35rem] sm:text-[1.75rem] font-bold text-[var(--text-primary)] m-0">Audit Log</h2>
  </div>

  <!-- Filter card -->
  <div class="bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700 shadow-sm p-5 mb-4">
    <form [formGroup]="filterForm" (ngSubmit)="applyFilters()" class="flex flex-wrap gap-4 items-end">
      <mat-form-field appearance="outline" class="flex-1 min-w-[180px]">
        <mat-label>Action</mat-label>
        <input matInput formControlName="action" placeholder="e.g. CreateUser" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="flex-1 min-w-[180px]">
        <mat-label>Target Type</mat-label>
        <input matInput formControlName="targetType" placeholder="e.g. User, Role" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="flex-1 min-w-[180px]">
        <mat-label>Actor User ID</mat-label>
        <input matInput formControlName="actorUserId" placeholder="User ID" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="flex-1 min-w-[160px]">
        <mat-label>From (ISO date)</mat-label>
        <input matInput formControlName="from" placeholder="2024-01-01" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="flex-1 min-w-[160px]">
        <mat-label>To (ISO date)</mat-label>
        <input matInput formControlName="to" placeholder="2024-12-31" />
      </mat-form-field>
      <div class="flex gap-2 mb-[1.25rem]">
        <app-btn variant="primary" type="submit">
          <mat-icon>search</mat-icon> Filter
        </app-btn>
        <app-btn variant="secondary" type="button" (btnClick)="clearFilters()">
          <mat-icon>clear</mat-icon> Clear
        </app-btn>
      </div>
    </form>
  </div>

  <app-data-table
    [columns]="['Timestamp', 'Actor', 'Action', 'Target', 'Details']"
    [loading]="loading"
    [isEmpty]="!loading && logs.length === 0"
    emptyIcon="receipt_long"
    emptyMessage="No audit entries found.">

    @for (l of logs; track l.id) {
      <tr class="tbl-row">
        <td class="tbl-cell whitespace-nowrap text-xs text-[var(--text-secondary)]">{{ l.timestamp | date:'short' }}</td>
        <td class="tbl-cell text-sm">{{ l.actorUserName }}</td>
        <td class="tbl-cell">
          <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium
                       bg-slate-100 text-slate-700 dark:bg-slate-700 dark:text-slate-300">
            {{ l.action }}
          </span>
        </td>
        <td class="tbl-cell text-sm">
          <span class="font-medium">{{ l.targetType }}</span>
          @if (l.targetId) {
            <span class="text-[var(--text-secondary)]"> · {{ l.targetId | slice:0:12 }}</span>
          }
        </td>
        <td class="tbl-cell-muted text-sm">{{ l.details || '—' }}</td>
      </tr>
    }
  </app-data-table>

  <!-- Paginator -->
  <div class="mt-2 bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700">
    <mat-paginator
      [length]="total"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 20, 50, 100]"
      (page)="onPage($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
