<div class="fixed top-4 left-4 right-4 sm:left-auto sm:right-4 z-[9999] flex flex-col gap-3 pointer-events-none sm:w-[380px]">
  @for (n of notifications$ | async; track n.id) {
    <div
      class="flex items-start gap-3 w-full rounded-xl shadow-lg border px-4 py-3.5 pointer-events-auto animate-fade-in"
      [ngClass]="getConfig(n.type).containerClass">

      <mat-icon
        class="!text-[1.25rem] !h-5 !w-5 shrink-0 mt-px"
        [ngClass]="getConfig(n.type).iconClass">
        {{ getConfig(n.type).icon }}
      </mat-icon>

      <p class="flex-1 text-sm font-medium m-0 leading-snug">{{ n.message }}</p>

      <button
        class="shrink-0 opacity-50 hover:opacity-100 transition-opacity cursor-pointer bg-transparent border-none p-0 -mt-0.5 -mr-1"
        (click)="dismiss(n.id)"
        type="button"
        aria-label="Dismiss">
        <mat-icon class="!text-[1rem] !h-4 !w-4">close</mat-icon>
      </button>
    </div>
  }
</div>
