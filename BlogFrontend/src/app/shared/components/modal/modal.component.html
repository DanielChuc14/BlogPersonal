<div class="p-5 sm:p-6 w-full max-w-[420px] bg-white dark:bg-slate-800 rounded-2xl">

  <!-- Header -->
  <div class="flex items-center gap-4 mb-4">
    <div
      class="w-11 h-11 rounded-full flex items-center justify-center shrink-0"
      [ngClass]="{
        'bg-red-100    text-red-600    dark:bg-red-900/30    dark:text-red-400':    iconColor === 'danger',
        'bg-yellow-100 text-yellow-600 dark:bg-yellow-900/30 dark:text-yellow-400': iconColor === 'warning',
        'bg-blue-100   text-blue-600   dark:bg-blue-900/30   dark:text-blue-400':   iconColor === 'info',
        'bg-green-100  text-green-600  dark:bg-green-900/30  dark:text-green-400':  iconColor === 'success'
      }">
      <mat-icon>{{ icon }}</mat-icon>
    </div>
    <h2 class="text-[1.05rem] font-bold text-gray-900 dark:text-white m-0 leading-snug">{{ title }}</h2>
  </div>

  <!-- Body -->
  <div class="text-gray-500 dark:text-slate-400 text-sm leading-relaxed mb-6 pl-[60px]">
    <ng-content select="[modal-body]"></ng-content>
  </div>

  <!-- Footer -->
  <div class="flex gap-3 justify-end pt-4 border-t border-gray-100 dark:border-slate-700">
    <ng-content select="[modal-footer]"></ng-content>
  </div>
</div>
