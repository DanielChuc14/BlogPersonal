<div class="p-4 sm:p-6 w-full max-w-[400px]">
  <!-- Header -->
  <div class="flex items-center gap-4 mb-4">
    <div class="w-11 h-11 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center shrink-0">
      <mat-icon class="text-red-600 dark:text-red-400">{{ data.icon || 'delete_forever' }}</mat-icon>
    </div>
    <h2 class="text-[1.1rem] font-bold text-[var(--text-primary)] m-0 leading-snug">{{ data.title }}</h2>
  </div>

  <!-- Body -->
  <p [innerHTML]="data.message" class="text-[var(--text-secondary)] text-sm leading-relaxed mb-6 pl-[60px]"></p>

  <!-- Actions -->
  <div class="flex gap-3 justify-end pt-4 border-t border-gray-100 dark:border-slate-700">
    <app-btn variant="ghost" type="button" (btnClick)="cancel()">
      {{ data.cancelText || 'Cancel' }}
    </app-btn>
    <app-btn variant="danger" type="button" (btnClick)="confirm()">
      {{ data.confirmText || 'Delete' }}
    </app-btn>
  </div>
</div>
