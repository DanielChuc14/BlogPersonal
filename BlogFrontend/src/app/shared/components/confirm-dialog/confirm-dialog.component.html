<div class="p-4 sm:p-6 w-full max-w-[400px]">
  <!-- Header -->
  <div class="flex items-center gap-4 mb-4">
    <div class="w-11 h-11 rounded-full bg-red-100 flex items-center justify-center shrink-0">
      <mat-icon class="text-red-600">{{ data.icon || 'delete_forever' }}</mat-icon>
    </div>
    <h2 class="text-[1.1rem] font-bold text-brand-dark m-0 leading-snug">{{ data.title }}</h2>
  </div>

  <!-- Body -->
  <p class="text-[#5f6368] text-sm leading-relaxed mb-6 pl-[60px]">{{ data.message }}</p>

  <!-- Actions -->
  <div class="flex gap-3 justify-end pt-4 border-t border-black/[.08]">
    <button mat-button type="button" (click)="cancel()">
      {{ data.cancelText || 'Cancel' }}
    </button>
    <button mat-raised-button color="warn" type="button" (click)="confirm()">
      {{ data.confirmText || 'Delete' }}
    </button>
  </div>
</div>
