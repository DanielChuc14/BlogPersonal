<div class="relative overflow-hidden rounded-xl border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-sm">

  <!-- Indeterminate loading bar -->
  @if (loading) {
    <div class="absolute top-0 left-0 right-0 h-0.5 overflow-hidden bg-gray-100 dark:bg-slate-700 z-10">
      <div class="loading-bar h-full bg-brand-accent"></div>
    </div>
  }

  <!-- Table -->
  <div class="overflow-x-auto">
    <table class="w-full min-w-[480px] text-sm text-left">
      <thead>
        <tr class="text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wide
                   bg-gray-50 dark:bg-slate-700/50
                   border-b border-gray-200 dark:border-slate-700">
          @for (col of columns; track col) {
            <th scope="col" class="px-5 py-3.5 whitespace-nowrap">{{ col }}</th>
          }
        </tr>
      </thead>
      <tbody class="text-gray-700 dark:text-slate-300 divide-y divide-gray-100 dark:divide-slate-700/60">
        <ng-content></ng-content>
      </tbody>
    </table>
  </div>

  <!-- Empty state -->
  @if (!loading && isEmpty) {
    <div class="flex flex-col items-center justify-center py-16 px-8 text-gray-400 dark:text-slate-500">
      <mat-icon class="!text-5xl !h-12 !w-12 mb-3 opacity-35">{{ emptyIcon }}</mat-icon>
      <p class="text-sm italic m-0">{{ emptyMessage }}</p>
    </div>
  }
</div>
